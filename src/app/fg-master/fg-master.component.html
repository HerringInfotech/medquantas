<app-loader [isLoader]="page_loading"></app-loader>
<div class="container-fluid custom-page">
    <div class="row">
        <div class="col-lg-12">
            <div class="mt-3">
                <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                    <div class="d-flex align-items-center justify-content-between ">
                        <h5 class="mb-0">FG Master</h5>
                        <div class="d-flex align-items-center">
                            <button type="button" [disabled]="btn_loading ? 'disabled': null"
                                class=" custom-button border-0 mx-1" (click)="downloadAllFGMasterExcel()"
                                tooltip="Export Price Master">
                                <fa-icon *ngIf="btn_loading" [icon]="faSpinner" [spin]="true" class="me-1"></fa-icon>
                                <fa-icon *ngIf="!btn_loading" [icon]="faFileExcel" class="me-1"></fa-icon>
                                <span *ngIf="!btn_loading">EXPORT</span>
                                <span *ngIf="btn_loading">EXPORTING...</span>
                            </button>
                            <button type="button" class=" custom-button border-0"
                                *ngIf="hasPermission('FGmaster.Create')" routerLink="form"
                                tooltip="Add a new FG master"><fa-icon [icon]="faPlus" class="me-1"></fa-icon>
                                ADD</button>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                    <div class="row pt-2 pb-3">
                        <!-- <div class="col-lg-4 col-xl-4 col-12">
                                <label class="m-0">Select Customer</label>
                                <ng-select (change)="get_brand(1)" [(ngModel)]="customer" class="mt-1 custom-select">
                                    <ng-option disabled value="">Select Customer</ng-option>
                                    <ng-container *ngFor="let data of customer_list">
                                        <ng-option [value]="data.id">{{ data.name }}</ng-option>
                                    </ng-container>
                                </ng-select>
                            </div> -->
                        <div class="col-lg-6 col-xl-4 col-12">
                            <label class="m-0">Search by FG master</label>
                            <div class="input-group flex-nowrap mt-1">
                                <input type="text" class="form-control " (keyup)="get_brand(1)"
                                    placeholder="Search FG master" [(ngModel)]="search">
                                <div class="input-group-append">
                                    <span class="input-group-text bg-white pointer rounded-start-0"
                                        id="addon-wrapping"><fa-icon class="text-secondary"
                                            [icon]="faSearch"></fa-icon></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <app-not-data *ngIf="!brand?.length" [message]="'No FG master found'" [route]="'form'"
                        [button]="'Add new FG master'"></app-not-data>
                    <table id="scroll-horizontal"
                        class="table border table-hover table-striped table-responsive-lg text-center rounded-top"
                        *ngIf="brand?.length">
                        <thead>
                            <tr>
                                <!-- <th scope="col" class=" bg-gradient text-start custom-select"
                                        tableColumn>Customer Name
                                    </th> -->
                                <th scope="col" class=" bg-gradient custom-select text-start">
                                    SAP Code</th>
                                <th scope="col" class=" bg-gradient custom-select text-start" tableColumn>FG
                                    Code<fa-icon (click)="toggleSort('code')" class="mx-1"
                                        [icon]="getSortIcon('code')"></fa-icon></th>
                                <th scope="col" tableColumn class=" bg-gradient custom-select text-start">FG
                                    Name<fa-icon class="mx-1" (click)="toggleSort('name')"
                                        [icon]="getSortIcon('name')"></fa-icon></th>
                                <!-- <th scope="col" class="bg-gradient text-start custom-select"
                                        tableColumn>FG Type</th>
                                    <th scope="col" class=" bg-gradient text-start custom-select"
                                        tableColumn>FG Sub Type
                                    </th> -->
                                <th scope="col" class=" bg-gradient text-start custom-select" tableColumn>FG Pack Type
                                </th>
                                <th scope="col" class="  bg-gradient text-start">Status</th>
                                <!-- <th scope="col" class="  bg-gradient custom-select text-start"
                                        tableColumn>Bom<fa-icon (click)="toggleSort('bom')" class="mx-1"
                                            [icon]="getSortIcon('bom')"></fa-icon></th>
                                            <th scope="col" class="  bg-gradient custom-select text-start"
                                        tableColumn>Costsheet<fa-icon (click)="toggleSort('costsheet')" class="mx-1"
                                            [icon]="getSortIcon('costsheet')"></fa-icon></th> -->
                                <!-- <th scope="col" class="bg-primary text-white bg-gradient text-start">Bom</th> -->
                                <!-- <th scope="col" class="bg-primary text-white bg-gradient text-start">Costsheet</th> -->
                                <th scope="col" class="  bg-gradient">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let data of brand; let index = index" class="details-row">
                                <!-- <td title="customer" 
                                        class="text-left-true item-name-td wrapLine">
                                        <span ngbPopover="{{data?.Customer_pop?.name}}"
                                            triggers="mouseenter:mouseleave">
                                            {{ data?.Customer_pop?.name }}
                                        </span>
                                    </td> -->
                                <td title="sapcode" class="left-align">{{
                                    data?.fg_sapcode }}</td>
                                <td title="code" class="left-align wrapLine">{{
                                    data?.brand_code }}</td>
                                <td title="name" class="text-left-true item-name-td wrapLine">
                                    <span ngbPopover="{{data?.name}}" triggers="mouseenter:mouseleave">
                                        {{ data?.name }}
                                    </span>
                                </td>
                                <!-- <td title="type" class="left-align wrapLine">{{
                                        data?.Fgtype_pop?.name }}</td>
                                    <td title="subtype"  class="left-align wrapLine">{{
                                        data?.Fgsubtype_pop?.name }}</td> -->
                                <td title="pack" class="left-align wrapLine">{{
                                    data?.Pack_pop?.name }}</td>
                                <td class="left-align">
                                    <span class=""
                                        [ngClass]="{ 'active-status': data?.status === 'Active', 'inactive-status': data?.status === 'Inactive' }">
                                        {{ data?.status }}</span>
                                </td>
                                <!-- <td title="bom"  class="left-align"
                                        [ngClass]="{'highlight-yes': data?.isBom, 'highlight-no': !data?.isBom}">
                                        {{ data?.isBom ? 'Yes' : 'No' }}
                                    </td>
                                    <td title="cost"  class="left-align"
                                        [ngClass]="{'highlight-yes': data?.isSheet, 'highlight-no': !data?.isSheet}">
                                        {{ data?.isSheet ? 'Yes' : 'No' }}
                                    </td> -->
                                <td title="Action" class="text-center" style="white-space: nowrap;">
                                    <button type="button" class="btn btn-outline-secondary btn-sm mr-1"
                                        *ngIf="hasPermission('FGmaster.Update')" routerLink="form/{{data._id}}">
                                        <fa-icon [icon]="faEdit"></fa-icon>
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm mr-1"
                                        [disabled]="!data.is_deleted" *ngIf="hasPermission('FGmaster.Delete')"
                                        (click)="confirm_delete(data)">
                                        <fa-icon [icon]="faTrashAlt"></fa-icon>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <app-pagination [data]="pagination_data"></app-pagination>
                </div>
            </div>
        </div>
    </div>
</div>
