<div class="container-fluid custom-page">
    <div class="row">
        <div class="col-lg-12">
            <div class="mt-3">
                <div class="mx-auto custom-height">
                    <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                        <div class="d-flex align-items-center justify-content-between ">
                            <h5 class="mb-0">Pack type Master</h5>
                            <div *ngIf="hasPermission('Packmaster.Create')">
                                <button type="button" class="custom-button" routerLink="form">
                                    <fa-icon [icon]="faPlus" class="me-1"></fa-icon> ADD
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                        <div class="row px-3 pt-2 pb-3">
                            <div class="col-lg-6 col-xl-4 col-12">
                                <label class="m-0">Search by Pack type</label>
                                <div class="input-group flex-nowrap mt-3">
                                    <input type="text" class="form-control " (keyup)="get_packtype(1)"
                                        placeholder="search pack type" [(ngModel)]="search">
                                    <div class="input-group-append">
                                        <span class="input-group-text bg-white pointer rounded-start-0"
                                            id="addon-wrapping"><fa-icon class="text-secondary"
                                                [icon]="faSearch"></fa-icon></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <app-not-data *ngIf="!packtype?.length && !page_loading" [message]="'No Packtype found'"
                            [route]="'form'" [button]="'Add new packtype'"></app-not-data>
                        <table id="scroll-horizontal"
                            class="table border table-hover table-striped table-responsive-lg text-center rounded-top"
                            *ngIf="packtype?.length">
                            <thead>
                                <tr>
                                    <th>S.No</th>
                                    <th scope="col" class="bg-blue left-align custom-select">Code<fa-icon class="mx-1"
                                            (click)="toggleSort('code')" [icon]="getSortIcon('code')"></fa-icon></th>
                                    <th scope="col" class="bg-blue left-align custom-select" tableColumn>
                                        Name<fa-icon class="mx-1" (click)="toggleSort('name')"
                                            [icon]="getSortIcon('name')"></fa-icon></th>
                                    <th scope="col" class="bg-blue"
                                        *ngIf="hasPermission('Packmaster.Update') || hasPermission('Packmaster.Delete')">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let data of packtype; let index = index" class="details-row">
                                    <td class="text-center">{{ index + 1 }}</td>
                                    <td title="code" class="left-align">{{ data?.code }}</td>
                                    <td title="name" class="left-align">{{ data?.name }}</td>
                                    <td title="Action" class="text-center">
                                        <button type="button" class="btn btn-outline-secondary btn-sm mr-1"
                                            *ngIf="hasPermission('Packmaster.Update')" routerLink="form/{{data._id}}">
                                            <fa-icon [icon]="faEdit"></fa-icon>
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm mr-1"
                                            [disabled]="!data.is_deleted" *ngIf="hasPermission('Packmaster.Delete')"
                                            (click)="confirm_delete(data)">
                                            <fa-icon [icon]="faTrashAlt"></fa-icon>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <app-pagination [data]="pagination_data"></app-pagination>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
