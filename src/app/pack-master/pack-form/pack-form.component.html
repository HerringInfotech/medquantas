<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="my-3 border-0">
                <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <h5 class="mb-0">
                            <span *ngIf="!packId">ADD Pack Type</span>
                            <span *ngIf="packId">Edit Pack Type</span>
                        </h5>
                        <button type="button" class="custom-button" (click)="goBack()">
                            <fa-icon [icon]="faArrowLeft"></fa-icon> Back
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                    <form class="p-3" #formData="ngForm" (ngSubmit)="formSubmit(formData)">
                        <div class="col-12 col-md-12">
                            <div class="row mt-2">
                                <div class="form-group col-lg-6 col-md-6">
                                    <mat-form-field appearance="outline" class="w-100">
                                        <mat-label>Pack Code</mat-label>
                                        <input matInput id="codeInput" name="code" placeholder="Pack Code"
                                            autocomplete="off" required [(ngModel)]="formValues['code']" #code="ngModel"
                                            [ngClass]="{ 'is-invalid': code.invalid && (code.dirty || code.touched || formData.submitted) }">
                                        <mat-error
                                            *ngIf="code.invalid && (code.dirty || code.touched || formData.submitted)">
                                            Pack Code is required.
                                        </mat-error>
                                    </mat-form-field>
                                </div>

                                <div class="form-group col-lg-6 col-md-6">
                                    <mat-form-field appearance="outline" class="w-100">
                                        <mat-label>Pack Name</mat-label>
                                        <input matInput id="nameInput" name="name" placeholder="Pack Name"
                                            autocomplete="off" required [(ngModel)]="formValues['name']" #name="ngModel"
                                            [ngClass]="{ 'is-invalid': name.invalid && (name.dirty || name.touched || formData.submitted) }">
                                        <mat-error
                                            *ngIf="name.invalid && (name.dirty || name.touched || formData.submitted)">
                                            Pack Name is required.
                                        </mat-error>
                                    </mat-form-field>
                                </div>
                            </div>

                            <div class="my-2">
                                <button class="custom-button" type="submit" [disabled]="btn_loading ? 'disabled': null">
                                    <span class="spinner-border" *ngIf="btn_loading" role="status"
                                        aria-hidden="true"></span>
                                    <span *ngIf="!btn_loading">{{ packId ? 'Update' : 'Create'}}</span>
                                </button>
                                <button class="reset-button ms-2" type="button" *ngIf="!packId"
                                    (click)="resetForm(formData)">Reset</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
