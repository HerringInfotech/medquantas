<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="my-3 bg-white rounded">
                <div class="mx-auto custom-height">
                    <div class="mb-0 bg-white p-2 px-3 border-top border-start border-end rounded rounded-bottom-0">
                        <div class="d-flex align-items-center justify-content-between ">
                            <h5 class="mb-0">Price Change Log</h5>
                            <button class="btn btn-primary" (click)="goBack()">Back</button>
                        </div>
                    </div>
                    <div class="border bg-white rounded rounded-top-0 table-responsive-sm">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Change Date</th>
                                    <th>User</th>
                                    <th>Existing Price</th>
                                    <th>New Price</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let data of itemLog; let i = index">
                                    <td>{{ formatDateWithoutTimeZone(data.changedate) }}</td>
                                    <td>{{ data?.user_pop?.name }}</td>
                                    <td>{{ data?.exist_price || 0 }}</td>
                                    <td [ngClass]="{'highlight-price': i === 0}">{{ data?.new_price || 0}}</td>
                                </tr>
                            </tbody>
                        </table>
                        <app-pagination [data]="pagination_data"></app-pagination>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
