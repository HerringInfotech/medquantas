<div class="container-fluid custom-page">
    <div class="row">
        <div class="col-lg-12">
            <div class="mt-3">
                <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <h5 class="mb-0 font-weight-bold">Item Type Master</h5>
                        <div class="d-flex align-items-center gap-2">
                            <button type="button" class="custom-button" routerLink="form">
                                <fa-icon [icon]="faPlus"></fa-icon> ADD
                            </button>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                    <div class="row px-3 pt-2 pb-3">
                        <div class="col-lg-6 col-xl-4 col-12">
                            <label class="m-0">Search by name/code</label>
                            <div class="input-group flex-nowrap mt-2">
                                <input type="text" class="form-control " (keyup)="get_itemtype(1)"
                                    placeholder="search Item Type" [(ngModel)]="search">
                                <div class="input-group-append">
                                    <span class="input-group-text bg-white pointer rounded-start-0"
                                        id="addon-wrapping"><fa-icon class="text-secondary"
                                            [icon]="faSearch"></fa-icon></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <app-not-data *ngIf="!catagory?.length" [message]="'No Item type found'" [route]="'form'"
                        [button]="'Add new Item type'"></app-not-data>
                    <table id="scroll-horizontal"
                        class="table border table-hover table-striped table-responsive-lg rounded-top"
                        *ngIf="catagory?.length">
                        <thead>
                            <tr>
                                <th scope="col" class="bg-blue custom-select text-start" (click)="toggleSort('code')">
                                    Code
                                    <fa-icon class="mx-1 sortable-icon"></fa-icon>
                                </th>
                                <th scope="col" tableColumn class="bg-blue left-align custom-select">Item
                                    Name
                                    <fa-icon class="mx-1 sortable-icon" (click)="toggleSort('name')"></fa-icon>
                                </th>
                                <th scope="col" class="bg-blue text-start"
                                    *ngIf="hasPermission('Itemtype.Update') || hasPermission('Itemtype.Delete')">
                                    Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let data of catagory; let index = index" class="details-row">
                                <td title="code" class="text-start">{{ data?.code }}</td>
                                <td title="name" class="left-align">{{ data?.name }}</td>
                                <td title="Action">
                                    <div class="btn-group text-center" role="group" aria-label="Basic example">
                                        <button type="button" [disabled]="!data.is_deleted"
                                            class="btn btn-outline-light text-dark border mr-1"
                                            *ngIf="hasPermission('Itemtype.Update')" routerLink="form/{{data._id}}">
                                            <fa-icon class="action-icon" [icon]="faEdit"></fa-icon>
                                        </button>
                                        <button type="button" [disabled]="!data.is_deleted"
                                            [style.cursor]="data.is_deleted ? 'pointer' : 'not-allowed'"
                                            class="btn btn-outline-light text-dark border mr-1"
                                            *ngIf="hasPermission('Itemtype.Delete')" (click)="confirm_delete(data)">
                                            <fa-icon class="action-icon" [icon]="faTrashAlt"></fa-icon>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <app-pagination [data]="pagination_data"></app-pagination>
                </div>
            </div>
        </div>
    </div>
</div>
