<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="my-3 border-0">
                <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <h5 class="mb-0">
                            <span *ngIf="!stageID">ADD Stage Master</span>
                            <span *ngIf="stageID">Edit Stage Master</span>
                        </h5>
                        <button type="button" class="custom-button" (click)="goBack()">
                            <fa-icon [icon]="faArrowLeft"></fa-icon> Back
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                    <form class="p-3" #formData="ngForm" (ngSubmit)="formSubmit(formData)">
                        <div class="col-12 col-md-12">
                            <div class="row mt-2">
                                <div class="form-group col-lg-6 col-md-6">
                                    <mat-form-field appearance="outline" class="w-100 mt-1">
                                        <mat-label>Select Item Type</mat-label>
                                        <mat-select name="type" [(ngModel)]="formValues['typeID']" required
                                            (selectionChange)="ontypeChange($event)">
                                            <mat-option *ngFor="let data of typeList" [value]="data.id">
                                                {{ data.name }}
                                            </mat-option>
                                        </mat-select>
                                    </mat-form-field>
                                </div>

                                <div class="form-group col-lg-6 col-md-6">
                                    <mat-form-field appearance="outline" class="w-100">
                                        <mat-label>Stage Code</mat-label>
                                        <input matInput id="codeInput" name="code" placeholder="Subtype Code"
                                            autocomplete="off" required [(ngModel)]="formValues['code']" #code="ngModel"
                                            [ngClass]="{ 'is-invalid': code.invalid && (code.dirty || code.touched || formData.submitted) }">
                                        <mat-error
                                            *ngIf="code.invalid && (code.dirty || code.touched || formData.submitted)">
                                            Stage Code is required.
                                        </mat-error>
                                    </mat-form-field>
                                </div>
                            </div>

                            <div class="row mt-2">
                                <div class="form-group col-lg-6 col-md-6">
                                    <mat-form-field appearance="outline" class="w-100">
                                        <mat-label>Stage Name</mat-label>
                                        <input matInput id="nameInput" name="name" placeholder="Stage Name"
                                            autocomplete="off" required [(ngModel)]="formValues['name']"
                                            [disabled]="stageID" #name="ngModel"
                                            [ngClass]="{ 'is-invalid': name.invalid && (name.dirty || name.touched || formData.submitted) }">
                                        <mat-error
                                            *ngIf="name.invalid && (name.dirty || name.touched || formData.submitted)">
                                            Stage Name is required.
                                        </mat-error>
                                    </mat-form-field>
                                </div>

                            </div>

                            <button class="custom-button" type="submit" [disabled]="btn_loading ? true : null">
                                <span class="spinner-border spinner-border-sm" *ngIf="btn_loading" role="status"
                                    aria-hidden="true"></span>
                                <span *ngIf="!btn_loading">{{ stageID ? 'Update' : 'Create' }}</span>
                            </button>
                            <button type="button" class="reset-button mx-1" *ngIf="!stageID"
                                (click)="resetForm(formData)">Reset</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
