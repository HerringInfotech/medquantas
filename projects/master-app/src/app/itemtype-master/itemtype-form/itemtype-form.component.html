<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="my-3 bg-white rounded custom-height">
                <div class="mx-auto col-lg-6 py-3">
                    <div class="mb-0 bg-white p-2 px-3 border-top border-start border-end rounded rounded-bottom-0">
                        <div class="d-flex align-items-center justify-content-between">
                            <h5 class="mb-0">
                                <span *ngIf="!itemtypeId">ADD Item Type Master</span>
                                <span *ngIf="itemtypeId">Edit Item Type Master</span>
                            </h5>
                            <button class="btn btn-primary" (click)="goBack()">Back</button>
                        </div>
                    </div>
                    <div class="bg-white border rounded rounded-top-0">
                        <form class="p-3" #formData="ngForm" (ngSubmit)="formSubmit(formData)">
                            <div class="col-12">
                                <div class="form-group">
                                    <label for="codeInput">Code <span
                                            style="color:red;font-family: sans-serif;">*</span></label>
                                    <input id="codeInput" name="code" class="form-control" placeholder="Item code"
                                        required autocomplete="off" [(ngModel)]="formValues['code']" #code="ngModel"
                                        [ngClass]="{ 'is-invalid': code.invalid && (code.dirty || code.touched || formData.submitted) }">
                                    <div *ngIf="code.invalid && (code.dirty || code.touched  || formData.submitted)"
                                        class="invalid-feedback">
                                        <span *ngIf="code.errors.required">Item Code is required.</span>
                                    </div>
                                </div>

                                <div class="form-group mt-2">
                                    <label for="nameInput">Item Name <span
                                            style="color:red;font-family: sans-serif;">*</span></label>
                                    <input id="nameInput" name="name" class="form-control" placeholder="Item name"
                                        required autocomplete="off" [(ngModel)]="formValues['name']" #name="ngModel"
                                        [ngClass]="{ 'is-invalid': name.invalid && (name.dirty || name.touched || formData.submitted) }">
                                    <div *ngIf="name.invalid && (name.dirty || name.touched  || formData.submitted)"
                                        class="invalid-feedback">
                                        <span *ngIf="name.errors.required">Item name is required.</span>
                                    </div>
                                </div>
                                <button class="btn btn-success bg-primary-blue border-0 mt-3" type="submit"
                                    [disabled]="btn_loading ? 'disabled': null">
                                    <span class="spinner-border" *ngIf="btn_loading" role="status"
                                        aria-hidden="true"></span>
                                    <span *ngIf="!btn_loading">{{ itemtypeId ? 'Update' : 'Create'}}</span>
                                </button>
                                <button class="btn btn-danger mt-3 ms-2" type="button"
                                    (click)="resetForm(formData)">Reset</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
