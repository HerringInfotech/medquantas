<app-loader [isLoader]="!page_loading"></app-loader>
<div class="container-fluid custom-page">
    <div class="row">
        <div class="col-lg-12">
            <div class="mt-3">
                <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <h5 class="mb-0 font-weight-bold">Sales Sheet Master</h5>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary px-4" routerLink="form">
                                <fa-icon [icon]="faPlus" class="me-1"></fa-icon> ADD
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-6px p-3 shadow-sm">
                        <div class="row g-3 pb-4">
                            <div class="col-lg-4 col-xl-4 col-12">
                                <label class="form-label">Search by name</label>
                                <div class="input-group search-glass">
                                    <input type="text" class="form-control" (keyup)="get_sheet(1)"
                                        placeholder="Search Instant Sheet" [(ngModel)]="search">
                                    <button class="btn btn-link py-0" type="button"><fa-icon
                                            [icon]="faSearch"></fa-icon></button>
                                </div>
                            </div>
                            <div class="col-lg-4 col-xl-4 col-12">
                                <label class="form-label">Search by Customer</label>
                                <div class="input-group search-glass">
                                    <input type="text" class="form-control" (keyup)="get_sheet(1)"
                                        placeholder="Search Customer" [(ngModel)]="uniqueCode">
                                    <button class="btn btn-link py-0" type="button"><fa-icon
                                            [icon]="faSearch"></fa-icon></button>
                                </div>
                            </div>

                            <div class="col-lg-4 col-xl-4 col-12">
                                <label class="form-label">Select Status</label>
                                <ng-select (change)="get_sheet(1)" placeholder="Select Status" class="radius-md">
                                    <ng-option value="Created">Created</ng-option>
                                    <ng-option value="Approved">Approved</ng-option>
                                </ng-select>
                            </div>
                        </div>

                        <app-not-data *ngIf="!bom_list?.length && page_loading" [message]="'No Sales Sheet found'"
                            [route]="'form'" [button]="'Add new Sales Sheet'"></app-not-data>

                        <div *ngIf="bom_list?.length">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Type</th>
                                        <th>Bom Code</th>
                                        <th class="text-start">Sheet Name</th>
                                        <th class="text-start">Customer Name</th>
                                        <th>FG Type</th>
                                        <th>Pack Type</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let data of bom_list; let index = index"
                                        class="details-row cursor-pointer" routerLink="view/{{data._id}}">
                                        <td>Generic</td>
                                        <td>{{ data?.productcode }}</td>
                                        <td class="text-start fw-600">{{ data?.productname }}</td>
                                        <td class="text-start text-uppercase small">{{ data?.customer?.name || 'GRAVITI
                                            PHARMA' }}</td>
                                        <td>Tablets</td>
                                        <td>Alu Alu</td>
                                        <td>
                                            <span class="status-badge"
                                                [ngClass]="data?.status === 'Approved' ? 'status-approved' : 'status-created'">{{
                                                data?.status }}</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="mt-4 pt-3 border-top d-flex align-items-center gap-3">
                                <div class="input-group search-glass" style="max-width: 400px;">
                                    <input type="text" class="form-control" placeholder="Enter Control Number">
                                </div>
                                <button class="btn btn-primary px-4">
                                    Go To <fa-icon [icon]="faChartLine" class="ms-2"></fa-icon>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
