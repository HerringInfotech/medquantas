<div class="container-fluid custom-page">
  <!-- Header Section -->
  <div class="header-card">
    <h5>Customer Master</h5>
    <div *ngIf="hasPermission('Customer.Create')">
      <button type="button" class="custom-button" routerLink="form">
        <fa-icon [icon]="faPlus"></fa-icon>
        <span>ADD</span>
      </button>
    </div>
  </div>

  <div class="bg-white rounded-6px p-3 shadow-sm">
    <!-- Filter Section -->
    <div class="filter-card">
      <div class="row g-4">
        <div class="col-lg-4 col-md-6">
          <label class="filter-label">Search by Customer</label>
          <div class="search-input-group">
            <input type="text" class="form-control" (keyup)="get_customer(1)" placeholder="Search customer name..."
              [(ngModel)]="search" />
            <fa-icon class="search-icon" [icon]="faSearch"></fa-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="table-container">
      <app-not-data *ngIf="!customer?.length && !page_loading" [message]="'No customer found'" [route]="'form'"
        [button]="'Add new customer'"></app-not-data>

      <div *ngIf="customer?.length">
        <table class="table table-hover">
          <thead>
            <tr>
              <th width="80">S.No</th>
              <th class="text-start pointer" (click)="toggleSort('name')">
                Name <fa-icon [icon]="getSortIcon('name')"></fa-icon>
              </th>
              <th class="text-start">Email</th>
              <th class="text-start">Mobile</th>
              <th width="120">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of customer; let index = index">
              <td>
                <span class="fw-bold text-secondary">{{ index + 1 }}</span>
              </td>
              <td class="name-column text-start">{{ data?.name }}</td>
              <td class="text-start">{{ data?.email || '-' }}</td>
              <td class="text-start">{{ data?.mobile || '-' }}</td>
              <td>
                <button type="button" class="action-btn edit-btn" *ngIf="hasPermission('Customer.Update')"
                  routerLink="form/{{data._id}}" title="Edit Customer">
                  <fa-icon [icon]="faEdit"></fa-icon>
                </button>
                <button type="button" class="action-btn delete-btn" [disabled]="!data.is_deleted"
                  *ngIf="hasPermission('Customer.Delete')" (click)="confirm_delete(data)" title="Delete Customer">
                  <fa-icon [icon]="faTrashAlt"></fa-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="mt-4 d-flex justify-content-end" *ngIf="customer?.length">
      <app-pagination [data]="pagination_data"></app-pagination>
    </div>
  </div>
</div>
