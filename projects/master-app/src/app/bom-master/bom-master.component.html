<app-loader [isLoader]="page_loading"></app-loader>

<div class="container-fluid custom-page" *ngIf="!page_loading">
  <!-- Header Section -->
  <div class="header-card flex-column flex-sm-row gap-3">
    <h5 class="mb-0">Bill of Material</h5>
    <div class="d-flex align-items-center gap-2 flex-wrap justify-content-center">
      <button type="button" class="custom-button py-2" (click)="importFileInput.click()" [disabled]="import_loading" title="Import Excel">
        <fa-icon [icon]="import_loading ? faSpinner : faUpload" [spin]="import_loading"></fa-icon>
        <span class="d-none d-sm-inline">{{ import_loading ? 'IMPORTING...' : 'IMPORT' }}</span>
      </button>
      <input type="file" #importFileInput accept=".xlsx,.xls" style="display: none" (change)="onFileSelected($event)" />

      <button type="button" class="custom-button py-2" (click)="downloadAllSheetsAsExcel()" [disabled]="btn_loading" title="Export Excel">
        <fa-icon [icon]="btn_loading ? faSpinner : faFileExcel" [spin]="btn_loading"></fa-icon>
        <span class="d-none d-sm-inline">{{ btn_loading ? 'EXPORTING...' : 'EXPORT' }}</span>
      </button>

      <button type="button" class="custom-button py-2" routerLink="form" *ngIf="hasPermission('Bommaster.Create')" title="Add New BOM">
        <fa-icon [icon]="faPlus"></fa-icon>
        <span class="d-none d-sm-inline">ADD</span>
      </button>
    </div>
  </div>

  <!-- Filter Section -->
  <div class="bg-white rounded-6px p-3 shadow-sm">

    <div class="filter-card">
      <div class="row g-4">
        <!-- Search by Name -->
        <div class="col-lg-3 col-md-6">
          <label class="filter-label">Search by Name</label>
          <div class="search-input-group">
            <input type="text" class="form-control" (keyup)="get_bom(1)" placeholder="Search BOM Name..."
              [(ngModel)]="search" />
            <fa-icon class="search-icon" [icon]="faSearch"></fa-icon>
          </div>
        </div>

        <!-- Search by Code -->
        <div class="col-lg-3 col-md-6">
          <label class="filter-label">Search by Code</label>
          <div class="search-input-group">
            <input type="text" class="form-control" (keyup)="get_bom(1)" placeholder="Search Code..."
              [(ngModel)]="searchcode" />
            <fa-icon class="search-icon" [icon]="faSearch"></fa-icon>
          </div>
        </div>

        <!-- Filter by FG Code -->
        <div class="col-lg-3 col-md-6">
          <label class="filter-label">Packing FG Code</label>
          <div class="search-input-group">
            <input type="text" class="form-control" (keyup)="get_bom(1)" placeholder="Search FG Code..."
              [(ngModel)]="searchFgCode" />
            <fa-icon class="search-icon" [icon]="faSearch"></fa-icon>
          </div>
        </div>

        <!-- Filter by Location -->
        <div class="col-lg-3 col-md-6">
          <label class="filter-label">Location</label>
          <select class="form-select location-select" (change)="get_bom(1)" [(ngModel)]="searchloc">
            <option value="">All Locations</option>
            <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="table-container">
      <!-- No Data Message -->
      <app-not-data *ngIf="!bom_list?.length && page_loading" [message]="'No BOM found'" [route]="'form'"
        [button]="'Add new BOM'"></app-not-data>

      <!-- BOM List Table -->
      <div *ngIf="bom_list?.length" class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th width="40" class="d-none d-sm-table-cell">#</th>
              <th width="100" class="d-none d-md-table-cell">Location</th>
              <th class="text-start" style="min-width: 200px;">Product Name</th>
              <th width="130" class="d-none d-sm-table-cell">Code</th>
              <th width="80">Packs</th>
              <th width="100">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of bom_list; let index = index">
              <td class="d-none d-sm-table-cell">
                <span class="fw-bold text-secondary">{{ index + pagination_data?.pagingCounter }}</span>
              </td>
              <td class="d-none d-md-table-cell">
                <span class="location-badge" style="font-size: 10px; padding: 3px 8px;">{{ data?.locCd }}</span>
              </td>
              <td class="name-column text-start" [title]="data?.name">
                <div class="text-truncate" style="max-width: 250px;">{{ data?.name }}</div>
                <!-- Mobile info stack -->
                <div class="d-md-none mt-1 d-flex gap-2">
                  <span class="text-muted d-sm-none" style="font-size: 10px;">{{ data?.locCd }}</span>
                  <span class="text-primary d-sm-none" style="font-size: 10px;">• {{ data?.code }}</span>
                </div>
              </td>
              <td class="code-column d-none d-sm-table-cell" style="font-size: 12px;">{{ data?.code }}</td>
              <td>
                <span class="badge rounded-pill bg-light text-dark border-0 px-2" style="font-size: 11px;">{{ data?.packstage?.length }}</span>
              </td>
              <td>
                <button type="button" class="action-btn edit-btn" routerLink="form/{{ data._id }}" title="Edit BOM">
                  <fa-icon [icon]="faEdit"></fa-icon>
                </button>
                <button type="button" class="action-btn view-btn" routerLink="view/{{ data._id }}" title="View BOM">
                  <fa-icon [icon]="faEye"></fa-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="mt-4 d-flex justify-content-end" *ngIf="bom_list?.length">
      <app-pagination [data]="pagination_data"></app-pagination>
    </div>
  </div>
</div>
