<div class="container-fluid custom-page">
    <div class="row">
        <div class="col-lg-12">
            <div class="mt-3">
                <div class="mx-auto custom-height">
                    <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
                        <div class="d-flex align-items-center justify-content-between ">
                            <h5 class="mb-0">Stage Master</h5>
                            <div>
                                <button type="button" class="custom-button" routerLink="form" *ngIf="hasPermission('StageMaster.Create')">
                                    <fa-icon [icon]="faPlus" class="me-1"></fa-icon> ADD
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                        <div class="row px-3 pt-2 pb-3">
                            <div class="col-lg-3 col-xl-3 col-12">
                                <label class="m-0">Search by name</label>
                                <div class="input-group flex-nowrap mt-1">
                                    <input type="text" class="form-control " (keyup)="get_stage(1)"
                                        placeholder="search stage name" [(ngModel)]="search">
                                    <div class="input-group-append">
                                        <span class="input-group-text bg-white pointer rounded-start-0"
                                            id="addon-wrapping"><fa-icon class="text-secondary"
                                                [icon]="faSearch"></fa-icon></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <app-not-data *ngIf="!stageList?.length" [message]="'No stageList Found'" [route]="'form'"
                            [button]="'Add new stage'"></app-not-data>
                        <table id="scroll-horizontal"
                            class="table border table-hover table-striped table-responsive-lg rounded-top"
                            *ngIf="stageList?.length">
                            <thead>
                                <tr>
                                    <th scope="col" class="bg-blue text-center">S.No</th>
                                    <th scope="col" class="bg-blue text-start">Type</th>
                                    <th scope="col" class="bg-blue text-start">Code</th>
                                    <th scope="col" class="bg-blue left-align">Name</th>
                                    <th scope="col" class="bg-blue text-start"
                                        *ngIf="hasPermission('StageMaster.Update') || hasPermission('StageMaster.Delete')">
                                        Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let data of stageList; let index = index" class="details-row">
                                    <td title="code" class="text-center">{{ index + 1 }}</td>
                                    <td title="code" class="text-start">{{ data?.type_pop?.name }}</td>
                                    <td title="code" class="text-start">{{ data?.code }}</td>
                                    <td title="name" class="left-align">{{ data?.name }}</td>
                                    <td title="Action">
                                        <div class="btn-group text-center" role="group" aria-label="Basic example">
                                            <button type="button" [disabled]="!data.is_deleted"
                                                class="btn btn-outline-light text-dark border mr-1"
                                                *ngIf="hasPermission('StageMaster.Update')"
                                                routerLink="form/{{data._id}}">
                                                <fa-icon class="action-icon" [icon]="faEdit"></fa-icon>
                                            </button>
                                            <button type="button" [disabled]="!data.is_deleted"
                                                [style.cursor]="data.is_deleted ? 'pointer' : 'not-allowed'"
                                                class="btn btn-outline-light text-dark border mr-1"
                                                *ngIf="hasPermission('StageMaster.Delete')"
                                                (click)="confirm_delete(data)">
                                                <fa-icon class="action-icon" [icon]="faTrashAlt"></fa-icon>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="bg-white"><app-pagination [data]="pagination_data"></app-pagination></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
