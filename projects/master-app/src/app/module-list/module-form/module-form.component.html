<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12">
            <div class="my-3 custom-height">
                <div class="mx-auto py-3">
                    <div class="mt-4">
                        <div class="mb-2 p-2 px-0">
                            <div class="d-flex align-items-center justify-content-between ">
                                <h5 class="mb-0">Module Management</h5>
                                <button class="custom-button" (click)="goBack()">Back</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
                            <form class="row m-0" #formData="ngForm" (ngSubmit)="formSubmit(formData)">
                                <div class="col-12">
                                    <div class="form-group">
                                        <label for="nameInput">Module name <span
                                                style="color:red;font-family: sans-serif;">*</span></label>
                                        <input id="nameInput"
                                            onkeypress='return ((event.charCode >= 65 && event.charCode <= 90) || (event.charCode >= 97 && event.charCode <= 122) || (event.charCode == 32))'
                                            name="name" class="form-control" placeholder="module name" required
                                            autocomplete="off" [(ngModel)]="formValues['name']" #name="ngModel"
                                            [ngClass]="{ 'is-invalid': name.invalid && (name.dirty || name.touched || formData.submitted) }">
                                        <div *ngIf="name.invalid && (name.dirty || name.touched  || formData.submitted)"
                                            class="invalid-feedback">
                                            <span *ngIf="name.errors.required">Module name is required.</span>
                                        </div>
                                    </div>
                                    <button class="custom-button border-0 mt-3" type="submit"
                                        [disabled]="btn_loading ? 'disabled': null">
                                        <span class="spinner-border" *ngIf="btn_loading" role="status"
                                            aria-hidden="true"></span>
                                        <span *ngIf="!btn_loading">Submit</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
