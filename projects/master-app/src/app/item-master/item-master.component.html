<app-loader [isLoader]="page_loading"></app-loader>

<div class="container-fluid custom-page" *ngIf="!page_loading">
  <!-- Header Section -->
  <div class="header-card flex-column flex-sm-row gap-3">
    <h5 class="mb-0">Item Master</h5>
    <div class="d-flex align-items-center gap-2 flex-wrap justify-content-center">
      <button type="button" class="custom-button py-2" (click)="fileInput.click()" [disabled]="btn_loading"
        title="Import Excel">
        <input type="file" #fileInput (change)="onFileChange($event)" accept=".xlsx" style="display: none" />
        <fa-icon [icon]="btn_loading ? faSpinner : faUpload" [spin]="btn_loading"></fa-icon>
        <span class="d-none d-sm-inline">{{ btn_loading ? 'IMPORTING...' : 'IMPORT' }}</span>
      </button>

      <button type="button" class="custom-button py-2" (click)="export_item()" [disabled]="btn_loading"
        title="Export Excel">
        <fa-icon [icon]="btn_loading ? faSpinner : faFileExcel" [spin]="btn_loading"></fa-icon>
        <span class="d-none d-sm-inline">{{ btn_loading ? 'EXPORTING...' : 'EXPORT' }}</span>
      </button>

      <button type="button" class="custom-button py-2" routerLink="form" *ngIf="hasPermission('Itemmaster.Create')"
        title="Add New Item">
        <fa-icon [icon]="faPlus"></fa-icon>
        <span class="d-none d-sm-inline">ADD</span>
      </button>
    </div>
  </div>

  <!-- Filter Section -->
  <div class="bg-white rounded-6px p-3 shadow-sm">
    <div class="filter-card">
      <div class="row g-4">
        <div class="col-lg-4 col-md-6">
          <label class="filter-label">Item Type</label>
          <select class="form-select modern-select" [(ngModel)]="selectedtype" (change)="fetch_items()">
            <option value="" disabled selected>Select Item Type</option>
            <option *ngFor="let option of type_list" [value]="option.code">{{ option?.code }}</option>
          </select>
        </div>

        <div class="col-lg-4 col-md-6">
          <label class="filter-label">Sub Type</label>
          <select class="form-select modern-select" [(ngModel)]="selectedsubtype" (change)="fetch_items()">
            <option value="" disabled selected>Select Sub Type</option>
            <option *ngFor="let option of subtype_list" [value]="option">{{ option }}</option>
          </select>
        </div>

        <div class="col-lg-4 col-12">
          <label class="filter-label">Search</label>
          <div class="search-input-group">
            <input type="text" class="form-control" (ngModelChange)="onSearchChange($event)"
              placeholder="Search item name/code..." [(ngModel)]="search" />
            <fa-icon class="search-icon" [icon]="faSearch"></fa-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="table-container">
      <app-not-data *ngIf="!item?.length" [message]="'No Item Master Found'" [route]="'form'"
        [button]="'Add new master item'"></app-not-data>

      <div *ngIf="item?.length" class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th width="50" class="d-none d-sm-table-cell">#</th>
              <th width="110" class="text-start d-none d-md-table-cell">Item Type</th>
              <th width="120" class="text-start">Code</th>
              <th class="text-start" style="min-width: 200px;">Item Name</th>
              <th width="100" class="text-center d-none d-sm-table-cell">Percentage</th>
              <th width="100" class="text-center">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let data of item; let index = index">
              <td class="d-none d-sm-table-cell">
                <span class="fw-bold text-secondary">{{ index + pagination_data?.pagingCounter }}</span>
              </td>
              <td class="text-start d-none d-md-table-cell">
                <span class="type-badge" style="font-size: 10px; padding: 4px 10px;">{{ data?.typeCode }}</span>
              </td>
              <td class="text-start code-column">
                <div class="d-flex flex-column">
                  <span style="font-size: 12.5px;">{{ data?.code }}</span>
                  <!-- Mobile badge for Item Type -->
                  <span class="d-md-none text-muted" style="font-size: 9px; text-transform: uppercase;">{{
                    data?.typeCode }}</span>
                </div>
              </td>
              <td class="name-column text-start" [title]="data?.name">
                <div class="text-truncate" style="max-width: 250px;">{{ data?.name }}</div>
                <!-- Mobile Percentage show -->
                <div class="d-sm-none mt-1">
                  <span class="badge bg-light text-dark p-1" style="font-size: 10px;">{{ data?.percentage }}%</span>
                </div>
              </td>
              <td class="text-center d-none d-sm-table-cell">
                <span class="badge rounded-pill bg-light text-dark border-0 px-3 py-1"
                  style="font-size: 11px; font-weight: 700;">{{ data?.percentage }}%</span>
              </td>
              <td class="text-center">
                <button type="button" class="action-btn edit-btn" routerLink="form/{{ data._id }}" title="Edit Item">
                  <fa-icon [icon]="faEdit"></fa-icon>
                </button>
                <button type="button" class="action-btn delete-btn" [disabled]="!data.is_deleted"
                  (click)="confirm_delete(data)" title="Delete Item">
                  <fa-icon [icon]="faTrashAlt"></fa-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="mt-4 d-flex justify-content-end" *ngIf="item?.length">
      <app-pagination [data]="pagination_data"></app-pagination>
    </div>
  </div>
</div>
