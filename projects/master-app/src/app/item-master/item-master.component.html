<!-- <app-loader [isLoader]="page_loading"></app-loader> -->
<div class="container-fluid custom-page" *ngIf="!page_loading">
  <div class="row">
    <div class="col-lg-12">
      <div class="mt-3">
        <div class="mx-auto custom-height">
          <div class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3">
            <div class="d-flex align-items-center justify-content-between">
              <h5 class="mb-0">Item Master</h5>
              <div>
                <div class="d-flex align-items-center">
                  <button type="custom-button" [disabled]="btn_loading ? 'disabled' : null" class="custom-button"
                    (click)="import_percentage()" tooltip="Import Item Percentage">
                    <input type="file" #fileInput (change)="onFileChange($event)" accept=".xlsx"
                      style="display: none" />
                    <fa-icon *ngIf="btn_loading" [icon]="faSpinner" [spin]="true" class="me-1"></fa-icon>
                    <fa-icon *ngIf="!btn_loading" [icon]="faUpload" class="me-1"></fa-icon>
                    <span *ngIf="!btn_loading">IMPORT</span>
                    <span *ngIf="btn_loading">IMPORTING...</span>
                  </button>
                  <button type="custom-button" [disabled]="btn_loading ? 'disabled' : null" class="custom-button mx-2"
                    (click)="export_item()" tooltip="Export Item Master">
                    <fa-icon *ngIf="btn_loading" [icon]="faSpinner" [spin]="true" class="me-1"></fa-icon>
                    <fa-icon *ngIf="!btn_loading" [icon]="faFileExcel" class="me-1"></fa-icon>
                    <span *ngIf="!btn_loading">EXPORT</span>
                    <span *ngIf="btn_loading">EXPORTING...</span>
                  </button>
                  <button type="button" class="custom-button" routerLink="form">
                    <fa-icon [icon]="faPlus" class="me-1"></fa-icon> ADD
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
            <div class="row px-3 pt-2 pb-3">
              <div class="col-lg-3 col-xl-3 col-12">
                <label class="form-label">Item Type</label>
                <select class="form-select" [(ngModel)]="selectedtype" (change)="fetch_items()">
                  <option value="" disabled selected>Select Item Type</option>
                  <option *ngFor="let option of type_list" [value]="option.code">
                    {{ option?.code }}
                  </option>
                </select>
              </div>
              <div class="col-lg-3 col-xl-3 col-12">
                <label class="form-label">Sub Type</label>
                <select class="form-select" [(ngModel)]="selectedsubtype" (change)="fetch_items()">
                  <option value="" disabled selected>Select Sub Type</option>
                  <option *ngFor="let option of subtype_list" [value]="option">
                    {{ option }}
                  </option>
                </select>
              </div>
              <div class="col-lg-3 col-xl-3 col-12">
                <label class="m-0">Search by Item</label>
                <div class="input-group flex-nowrap mt-1">
                  <input type="text" class="form-control" (ngModelChange)="onSearchChange($event)"
                    placeholder="search item name/code" [(ngModel)]="search" />
                  <div class="input-group-append">
                    <span class="input-group-text bg-white pointer rounded-start-0" id="addon-wrapping"><fa-icon
                        class="text-secondary" [icon]="faSearch"></fa-icon></span>
                  </div>
                </div>
              </div>
            </div>
            <app-not-data *ngIf="!item?.length" [message]="'No Item Master Found'" [route]="'form'"
              [button]="'Add new master item'"></app-not-data>
            <table id="scroll-horizontal" class="table border table-hover table-striped table-responsive-lg rounded-top"
              *ngIf="item?.length">
              <thead>
                <tr>
                  <th scope="col" class="bg-blue text-center">S.No</th>
                  <th scope="col" class="bg-blue text-start">Item Type</th>
                  <th scope="col" class="bg-blue text-start">Sub Type</th>
                  <th scope="col" class="bg-blue text-start">Item Code</th>
                  <th scope="col" tableColumn class="bg-blue text-start">Item Name</th>
                  <th scope="col" class="bg-blue text-start">Percentage</th>
                  <th scope="col" class="bg-blue text-center" *ngIf="
                      hasPermission('ItemMaster.Update') ||
                      hasPermission('ItemMaster.Delete')
                    ">
                    Action
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let data of item; let index = index" class="details-row">
                  <td title="name" class="text-center">
                    {{ index + pagination_data?.pagingCounter }}
                  </td>
                  <td class="left-align wrapLine">{{ data?.typeCode }}</td>
                  <td class="left-align wrapLine">{{ data?.subtypeCode }}</td>
                  <td class="left-align">{{ data?.code }}</td>
                  <td class="left-align">{{ data?.name }}</td>
                  <td class="left-align wrapLine">{{ data?.percentage }}</td>
                  <td title="Action" class="text-center" style="white-space: nowrap">
                    <button type="button" class="btn btn-outline-secondary btn-sm mr-1"
                      *ngIf="hasPermission('ItemMaster.Update')" routerLink="form/{{ data._id }}">
                      <fa-icon [icon]="faEdit"></fa-icon>
                    </button>
                    <button type="button" class="btn btn-outline-secondary btn-sm mr-1" [disabled]="!data.is_deleted"
                      *ngIf="hasPermission('ItemMaster.Delete')" (click)="confirm_delete(data)">
                      <fa-icon [icon]="faTrashAlt"></fa-icon>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
            <div class="bg-white">
              <app-pagination [data]="pagination_data"></app-pagination>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
