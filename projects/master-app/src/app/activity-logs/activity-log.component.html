<div class="container-fluid" *ngIf="!loading">
  <div class="row">
    <div class="col-lg-12">
      <div class="mt-3">
        <div class="mx-auto custom-height">
          <div
            class="bg-white p-3 border-top border-start border-end rounded shadow-sm mb-3"
          >
            <div class="d-flex align-items-center justify-content-between">
              <h5 class="mb-0">Activity Logs</h5>
            </div>
          </div>

          <div class="bg-white rounded-6px table-responsive-sm p-3 shadow-sm">
            <div class="row px-3 pt-2 pb-3">
              <div class="col-lg-3 col-xl-3 col-12 mb-2">
                <label class="m-0">Filter by Action</label>
                <select
                  class="form-control mt-1"
                  [(ngModel)]="selectedAction"
                  (change)="fetchLogs(selectedTab)"
                >
                  <option value="">All</option>
                  <option
                    *ngFor="let action of actions"
                    [value]="action"
                    class="text-capitalize"
                  >
                    {{ action }}
                  </option>
                </select>
              </div>
              <div class="col-lg-3 col-xl-3 col-12">
                <label class="m-0">Select User</label>
                <ng-select
                  class="mt-1"
                  [(ngModel)]="selecteduser"
                  (change)="fetchLogs(selectedTab)"
                >
                  <ng-option disabled value="">Select User</ng-option>
                  <ng-option *ngFor="let item of user_list" [value]="item._id">
                    {{ item.name }}
                  </ng-option>
                </ng-select>
              </div>
            </div>
          </div>
          <div class="d-flex flex-wrap gap-2 mb-3 mt-3">
            <button
              *ngFor="let tab of logSections"
              class="btn custom-tab-btn"
              [ngClass]="{ active: selectedTab === tab.key }"
              (click)="onTabChange(tab.key)"
            >
              <fa-icon
                *ngIf="tab.icon"
                [icon]="tab.icon"
                class="me-1"
              ></fa-icon>
              {{ tab.label }}
            </button>
          </div>

          <table
            class="table border table-striped table-responsive-lg rounded-top table-layout"
            *ngIf="logs?.length"
          >
            <thead>
              <tr>
                <th class="bg-blue text-center" style="width: 5%">S.No</th>
                <th class="bg-blue text-start" style="width: 15%">Timestamp</th>
                <th class="bg-blue text-start" style="width: 15%">User</th>
                <th class="bg-blue text-start" style="width: 15%">Action</th>
                <th class="bg-blue text-start" style="width: 50%">
                  Description
                </th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let log of logs; let i = index">
                <td class="text-center">
                  {{
                    (pagination_data.page - 1) * pagination_data.limit + i + 1
                  }}
                </td>
                <td>{{ log.timestamp | date : "short" }}</td>
                <td>{{ log.user?.name || "N/A" }}</td>
                <td class="text-uppercase">{{ log.action }}</td>
                <td>
                  <div
                    class="description-cell"
                    [innerHTML]="log.description"
                  ></div>
                </td>
              </tr>
            </tbody>
          </table>

          <app-not-data
            *ngIf="!logs.length"
            [message]="'No logs found'"
            [route]="''"
            [button]="'Refresh'"
          ></app-not-data>
          <app-pagination [data]="pagination_data"></app-pagination>
        </div>
      </div>
    </div>
  </div>
</div>
